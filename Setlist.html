<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>PLAYER Setlist</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f16" />
  <link rel="stylesheet" href="Setlist.css">
</head>

<body>
  <header>
    <div class="bar">
      <!-- <button id="enableMidi" class="primary">MIDI</button> -->
      <div id="setlistMenu" class="menu-container">
        <button id="setlistMenuBtn" class="tb" title="Select setlist">☰</button>
        <div id="setlistDropdown" class="menu-dropdown" style="display: none;">
          <div id="setlistOptions"></div>
        </div>
      </div>

      <div class="spacer"></div>

      <div id="modeMenu" class="menu-container">
        <button id="modeMenuBtn" class="tb" title="Select mode">☰</button>
        <div id="modeDropdown" class="menu-dropdown" style="display: none;">
          <div id="modeOptions"></div>
        </div>
      </div>

      <div class="spacer"></div>

      <span id="inStatus" class="pill warn">No MIDI</span>
      <span id="outStatus" class="pill warn">No MIDI</span>

      <!-- <button id="displayModeToggle" class="tb" aria-pressed="false" title="Toggle mode">PRESETS</button> -->

      <div class="spacer"></div>

      <button id="tuner" class="tb" aria-pressed="false"><b>&#9834;</b></button>

      <div class="spacer"></div>

      <button id="soloToggle" class="tb" title="Switch to SOLO PRESET and BACK">SOLO</button>

      <div class="spacer"></div>

      <button id="zoomOut" class="tb" aria-pressed="false">-</button>
      <button id="zoomIn" class="tb" aria-pressed="false">+</button>
      <button id="fullScreenToggle" class="tb" aria-pressed="false" title="Toggle Full-Screen Mode">⇗</button>
    </div>
  </header>

  <main>
    <div id="presetBankSelectorBar" style="display: none;"></div>
    <div id="setlistGrid">
      <section class="card">
        <div id="setlist" class="list"></div>
      </section>

      <section class="card">
        <div id="notes" class="notes"></div>
      </section>
    </div>
  </main>

  <div class="footer">
    <div class="footerBar">
      <button id="effectBtn1" class="footerBtn">E 1</button>
      <button id="effectBtn2" class="footerBtn">E 2</button>
      <button id="effectBtn3" class="footerBtn">E 3</button>
      <button id="effectBtn4" class="footerBtn">E 4</button>
    </div>
  </div>

  <script src="SetlistModels.js"></script>
  <script src="Setlist.js"></script>
</body>

</html>
