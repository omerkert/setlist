<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>PLAYER Setlist</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f16" />
  <link rel="stylesheet" href="Setlist.css">
</head>

<body>
  <header>
    <div class="bar">
      <!-- <button id="enableMidi" class="primary">MIDI</button> -->
      <div id="setlistMenu" class="menu-container">
        <button id="setlistMenuBtn" class="tb" title="Select setlist">☰</button>
        <div id="setlistDropdown" class="menu-dropdown" style="display: none;">
          <div id="setlistOptions"></div>
        </div>
      </div>
      <span id="inStatus" class="pill warn">No MIDI</span>
      <span id="outStatus" class="pill warn">No MIDI</span>

      <div class="spacer"></div>

      <button id="effectBtn1" class="tb">E 1</button>
      <button id="effectBtn2" class="tb">E 2</button>
      <button id="effectBtn3" class="tb">E 3</button>
      <button id="effectBtn4" class="tb">E 4</button>

      <div class="spacer"></div>

      <button id="zoomOut" class="tb" aria-pressed="false">-</button>
      <button id="zoomIn" class="tb" aria-pressed="false">+</button>
      <button id="tuner" class="tb" aria-pressed="false"><b>&#9834;</b></button>
      <button id="modeToggle" class="tb" aria-pressed="false" title="Toggle mode">⊞</button>
      <button id="perfToggle" class="tb" aria-pressed="false" title="Toggle Full-Screen Mode">&#8663;</button>
    </div>
  </header>

  <main>
    <div id="setlistGrid">
      <section class="card">
        <div id="presetBankSelector" style="display: none; margin-bottom: 14px; margin-top: 6px"></div>
        <div id="setlist" class="list"></div>
      </section>

      <section class="card">
        <div id="notes" class="notes"></div>
      </section>
    </div>
  </main>

  <div class="footer">
    <div class="bar">
        <button id="directBtn1" class="directBtn" aria-pressed="false">...</button>
        <button id="directBtn2" class="directBtn" aria-pressed="false">...</button>
        <button id="directBtn3" class="soloBtn" aria-pressed="false">...</button>
        <button id="directBtn4" class="directBtn" aria-pressed="false">...</button>
        <button id="directBtn5" class="directBtn" aria-pressed="false">...</button>
    </div>
  </div>

  <script src="SetlistModels.js"></script>
  <script src="Setlist.js"></script>
</body>

</html>
